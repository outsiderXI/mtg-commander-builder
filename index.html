<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Commander Deck Builder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>MTG Commander Deck Builder</h1>

<label>Commander Name</label>
<br>

<label>Upload ManaBox CSV</label>

<script src="script.js"></script>

</body>
</html>
