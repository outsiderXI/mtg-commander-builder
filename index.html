<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Commander Deck Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>MTG Commander Deck Builder</h1>

    <div class="panel">
      <label for="commanderInput">Commander Name</label>
      <div class="autocomplete-wrap">
        <input
          id="commanderInput"
          type="text"
          placeholder="Start typing a commander name..."
          autocomplete="off"
        />
        <div id="autocompleteList" class="autocomplete-list hidden"></div>
      </div>

      <label for="csvFile">Upload ManaBox CSV</label>
      <input id="csvFile" type="file" accept=".csv" />

      <button id="generateBtn" type="button">Generate Deck</button>
    </div>

    <div class="panel">
      <h2>Progress</h2>
      <div id="progressContainer">
        <div id="progressBar"></div>
      </div>
      <div id="statusText">Idle</div>
      <div id="subStatusText" class="sub-status"></div>

      <div class="log-wrap">
        <div class="log-header">Activity Log</div>
        <div id="activityLog" class="activity-log"></div>
      </div>
    </div>

    <div class="results-grid">
      <div class="panel">
        <h2>Commander</h2>
        <div class="commander-column">
          <img id="commanderImage" class="commander-image hidden" alt="Commander card image" />
          <div id="commanderMeta" class="commander-meta"></div>

          <h3 class="themes-heading">Detected Themes</h3>
          <ul id="themes"></ul>
        </div>
      </div>

      <div class="panel">
        <h2>Moxfield Export</h2>
        <div id="deckSummary" class="deck-summary"></div>
        <textarea id="moxfieldExport" class="export-box" readonly></textarea>
        <button id="copyExportBtn" type="button">Copy Decklist</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
